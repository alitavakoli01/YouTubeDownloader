name: Clean old downloads

on:
  schedule:
    - cron: '0 */3 * * *'   # هر 3 ساعت یکبار اجرا شود (می‌توانید به روزانه تغییر دهید)
  workflow_dispatch:        # امکان اجرای دستی

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Delete files older than 24 hours
        run: |
          find ./downloads -type f -mmin +1440 -delete
          find ./downloads -type d -empty -delete

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "cleanup: remove old downloads (older than 24h)"
            git push
          fi
