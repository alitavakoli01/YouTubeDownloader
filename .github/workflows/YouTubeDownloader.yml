name: 🎯 YouTubeDownloader (Batch)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🎬 YouTube Video URLs (Comma or newline separated)'
        required: true
        type: string
      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'
      quality:
        description: '🎚️ Quality (video: 144p/360p/480p/720p/1080p | audio: 64kbps/128kbps/192kbps/320kbps)'
        required: false
        type: string
        default: '720p'
      split_threshold_mb:
        description: '📦 Split files larger than (MB) — 0 = never'
        required: false
        type: number
        default: 90

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download-and-process:
    name: 🚀 Batch Download & Process
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📂 Clone Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip curl jq python3

      - name: 📝 Prepare Python Script
        run: |
          cat << 'PYEOF' > convert.py
          import os, sys, json, time, re
          import requests
          
          YT_URL = os.environ['CURRENT_URL']
          OUTPUT_TYPE = os.environ['OUTPUT_TYPE']
          QUALITY = os.environ.get('QUALITY', '720p')
          
          API_ENDPOINT = "https://hub.ytconvert.org/api/download"
          STATUS_CHECK_INTERVAL = 2
          MAX_ATTEMPTS = 90
          
          VIDEO_QUALITIES = ['144p', '360p', '480p', '720p', '1080p']
          AUDIO_BITRATES = ['64kbps', '128kbps', '192kbps', '320kbps']
          
          def normalize_quality(output_type, quality_input):
              if output_type == 'audio':
                  quality = quality_input.lower().strip().replace('p', '')
                  if 'kbps' not in quality:
                      quality = quality.replace('k', 'kbps') if quality.endswith('k') else quality + 'kbps'
                  if quality in AUDIO_BITRATES: return quality
                  bitrate_num = int(''.join(filter(str.isdigit, quality)))
                  supported_nums = [int(''.join(filter(str.isdigit, b))) for b in AUDIO_BITRATES]
                  closest = min(supported_nums, key=lambda x: abs(x - bitrate_num))
                  return [b for b in AUDIO_BITRATES if str(closest) in b][0]
              else:
                  quality = quality_input.lower().strip().replace('k', '')
                  if not quality.endswith('p'): quality += 'p'
                  if quality in VIDEO_QUALITIES: return quality
                  quality_map = {'240p': '360p', '4k': '1080p', '2160p': '1080p', '1440p': '1080p', '2k': '1080p'}
                  return quality_map.get(quality, '720p')
          
          QUALITY = normalize_quality(OUTPUT_TYPE, QUALITY)
          
          HEADERS = {
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64; rv:140.0) Gecko/20100101 Firefox/140.0",
              "Accept": "application/json",
              "Referer": "https://media.ytmp3.gg/",
              "Content-Type": "application/json",
              "Origin": "https://media.ytmp3.gg",
          }
          
          payload = {
              "url": YT_URL,
              "os": "linux",
              "output": {"type": OUTPUT_TYPE, "format": "mp3" if OUTPUT_TYPE == 'audio' else "mp4"}
          }
          if OUTPUT_TYPE == 'audio':
              payload["audio"] = {"bitrate": QUALITY}
          else:
              payload["output"]["quality"] = QUALITY
          
          session = requests.Session()
          session.get("https://media.ytmp3.gg/", headers=HEADERS)
          
          try:
              response = session.post(API_ENDPOINT, json=payload, headers=HEADERS, timeout=30)
              if response.status_code != 200:
                  if response.status_code == 400:
                      if OUTPUT_TYPE == 'audio':
                          payload["audio"]["bitrate"] = "192kbps"
                          QUALITY = "192kbps"
                      else:
                          payload["output"]["quality"] = "720p"
                          QUALITY = "720p"
                      response = session.post(API_ENDPOINT, json=payload, headers=HEADERS, timeout=30)
                  response.raise_for_status()
              data = response.json()
          except Exception as e:
              print(f"❌ Request failed: {e}")
              sys.exit(1)
          
          status_url = data.get('statusUrl')
          title = data.get('title', 'youtube_video')
          
          if not status_url:
              sys.exit(1)
          
          download_url = None
          for attempt in range(MAX_ATTEMPTS):
              time.sleep(STATUS_CHECK_INTERVAL)
              try:
                  status_data = session.get(status_url, headers=HEADERS, timeout=15).json()
              except:
                  continue
              
              if status_data.get('status') == 'completed':
                  download_url = status_data.get('downloadUrl')
                  break
              elif status_data.get('status') == 'failed':
                  sys.exit(1)
          
          if not download_url:
              sys.exit(1)
          
          video_id_match = re.search(r'(?:v=|\/)([a-zA-Z0-9_-]{11})', YT_URL)
          video_id = video_id_match.group(1) if video_id_match else "unknown"
          safe_title = re.sub(r'[^a-zA-Z0-9\-_]', '_', title.replace(' ', '_'))[:60].strip('_') or video_id
          
          extension = "mp3" if OUTPUT_TYPE == 'audio' else "mp4"
          filename = f"{safe_title}_{video_id}_{QUALITY}.{extension}"
          
          with open('/tmp/current_metadata.txt', 'w', encoding='utf-8') as f:
              f.write(f"{download_url}\n{filename}\n{OUTPUT_TYPE}\n{QUALITY}\n")
          PYEOF

      - name: 🎯 Process & Download URLs
        run: |
          mkdir -p ./downloads/temp
          
          # Replace newlines and commas with spaces to iterate over them
          RAW_URLS="${{ github.event.inputs.urls }}"
          URLS=$(echo "$RAW_URLS" | tr ',' ' ' | tr '\n' ' ' | tr '\r' ' ')
          
          for URL in $URLS; do
            if [ -z "$URL" ]; then continue; fi
            
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔗 Processing: $URL"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            export CURRENT_URL="$URL"
            export OUTPUT_TYPE="${{ github.event.inputs.type }}"
            export QUALITY="${{ github.event.inputs.quality }}"
            
            # Run conversion
            python3 convert.py
            
            if [ $? -ne 0 ] || [ ! -f /tmp/current_metadata.txt ]; then
              echo "❌ Failed to convert $URL, skipping to next..."
              continue
            fi
            
            DOWNLOAD_URL=$(sed -n '1p' /tmp/current_metadata.txt)
            FILENAME=$(sed -n '2p' /tmp/current_metadata.txt)
            
            echo "⬇️ Downloading: $FILENAME..."
            
            curl --progress-bar -L \
              -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64; rv:140.0) Gecko/20100101 Firefox/140.0" \
              -H "Referer: https://media.ytmp3.gg/" \
              -o "./downloads/temp/$FILENAME" \
              --max-time 300 --retry 3 --retry-delay 5 "$DOWNLOAD_URL"
            
            rm -f /tmp/current_metadata.txt
          done

      - name: ✂️ Smart Split & Compress Files
        run: |
          THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          THRESHOLD_BYTES=$((THRESHOLD_MB * 1024 * 1024))
          
          process_file() {
            local file="$1"
            local size=$(stat -c%s "$file")
            local basename=$(basename "$file")
            local size_mb=$((size / 1024 / 1024))
            
            if [[ $THRESHOLD_BYTES -gt 0 && $size -gt $THRESHOLD_BYTES ]]; then
              echo "✂️ Splitting $basename (${size_mb}MB)"
              cd ./downloads
              zip -r -s "${THRESHOLD_MB}m" "${basename}.zip" "temp/${basename}"
              cd ..
              rm "$file"
            else
              echo "📁 Moving $basename (${size_mb}MB)"
              mv "$file" "./downloads/"
            fi
          }
          
          export -f process_file
          export THRESHOLD_BYTES THRESHOLD_MB
          
          # Process all files downloaded in the temp folder
          find ./downloads/temp -type f -exec bash -c 'process_file "$0"' {} \;
          rm -rf ./downloads/temp
          
          echo "📂 Final processed files:"
          ls -lh ./downloads/ 2>/dev/null | tail -n +2 | awk '{print "  • " $NF " (" $5 ")"}'

      - name: 📤 Commit and Push to Repository
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add ./downloads/
          
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
          
          mapfile -t STAGED_FILES < <(git diff --staged --name-only)
          TOTAL_FILES=${#STAGED_FILES[@]}
          echo "📦 Found $TOTAL_FILES file(s) to upload"
          
          git reset HEAD ./downloads/
          
          BATCH_SIZE=5
          for (( i=0; i<TOTAL_FILES; i+=BATCH_SIZE )); do
            BATCH_NUM=$((i / BATCH_SIZE + 1))
            END=$((i + BATCH_SIZE))
            [[ $END -gt $TOTAL_FILES ]] && END=$TOTAL_FILES
            
            for (( j=i; j<END; j++ )); do
              git add "${STAGED_FILES[$j]}"
            done
            
            git commit -m "chore: add YouTube content batch $BATCH_NUM [skip ci]"
            git pull --rebase origin "$BRANCH" || true
            git push origin "HEAD:$BRANCH"
          done
    echo "🎉 All files successfully uploaded to $BRANCH"
